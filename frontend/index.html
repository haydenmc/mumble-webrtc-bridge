<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mumble WebRTC Bridge</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Login view -->
  <div id="view-login" class="view">
    <div class="card">
      <h1>Mumble Bridge</h1>
      <form id="login-form">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="YourName" autocomplete="username" required />
        <label for="password">Server Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
        <p id="login-error" class="error hidden"></p>
        <button type="submit" id="connect-btn">Connect</button>
      </form>
    </div>
  </div>

  <!-- Room view -->
  <div id="view-room" class="view hidden">
    <div class="room-layout">
      <aside class="sidebar">
        <h2>Users</h2>
        <ul id="user-list"></ul>
        <div class="controls">
          <button id="mute-btn" class="btn-mute">Mute</button>
          <button id="disconnect-btn" class="btn-disconnect">Disconnect</button>
        </div>
      </aside>
      <main class="chat-panel">
        <div id="chat-messages"></div>
        <form id="chat-form">
          <input id="chat-input" type="text" placeholder="Type a message…" autocomplete="off" />
          <button type="submit">Send</button>
        </form>
      </main>
    </div>
  </div>

  <audio id="remote-audio" autoplay playsinline></audio>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
